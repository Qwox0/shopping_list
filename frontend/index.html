<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fullstack Rust Shopping List">

    <link data-trunk rel="scss" href="style.scss" />
    <link data-trunk rel="copy-dir" href="assets/" />
    <link data-trunk rel="copy-dir" href="icons/" />
    <link data-trunk rel="copy-dir" href="language/" />
    <link data-trunk rel="icon" type="image/ico" href="/public/favicon.ico" />

    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-file" href="pwa.webmanifest" />
    <link rel="manifest" href="pwa.webmanifest" />
    <title>Shopping List</title>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js").then((registration) => {
                    // Registration was successful
                    console.log("[Service Worker] ", "Registration successful! Scope:", registration.scope);
                }, (err) => {
                    // registration failed :(
                    console.log("[Service Worker] ", "Registration failed:", err);
                }
                );
            });
        }
    </script>
</head>

<body></body>

</html>
